<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Ace Casino • Ukrainian Reborn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap');
        :root { --gold: #d4af77; --dark: #1a1208; --accent: #c9a66b; }
        body { background: linear-gradient(135deg, #1a1208 0%, #2c2218 100%); font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .header-font { font-family: 'Playfair Display', sans-serif; }
        .gold-glow { text-shadow: 0 0 20px #d4af77, 0 0 40px #c9a66b; }
        .emoji-stable { font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","Twemoji Mozilla",sans-serif; font-size: 3rem; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .card-hover:active { transform: scale(0.95); }
        button { touch-action: manipulation; pointer-events: auto; }
        @media (max-width: 640px) {
            button { min-height: 56px; font-size: 1.15rem; }
            .modal { margin: 12px; border-radius: 24px; }
        }
    </style>
</head>
<body class="min-h-screen text-[#d4af77]">

    <header class="sticky top-0 bg-[#1a1208]/95 border-b border-[#d4af77]/30 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-[#d4af77] to-[#c9a66b] rounded-2xl flex items-center justify-center text-4xl">♠️</div>
                <h1 class="header-font text-4xl gold-glow">LUCKY ACE</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-[#2c2218] px-6 py-3 rounded-3xl border border-[#d4af77]/40 flex items-center gap-2">
                    <span id="balance" class="header-font text-3xl font-bold">1000</span>
                    <span class="text-2xl">€</span>
                </div>
                <button onclick="showHistory()" class="bg-[#2c2218] px-6 py-3 rounded-3xl border border-[#d4af77]/40 flex items-center gap-2 hover:border-[#d4af77]">
                    <i class="fa-solid fa-clock"></i> <span class="hidden sm:inline">Історія</span>
                </button>
                <button onclick="rechargeModal()" class="bg-[#d4af77] text-[#1a1208] px-6 py-3 rounded-3xl font-semibold flex items-center gap-2">ПОПОВНИТИ</button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-12">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
            <div onclick="showGame('roulette')" class="card-hover bg-[#2c2218] rounded-3xl border border-[#d4af77]/30 cursor-pointer p-2">
                <div class="h-56 flex items-center justify-center emoji-stable">🎰</div>
                <h4 class="header-font text-3xl text-center mt-4">Рулетка</h4>
            </div>
            <div onclick="showGame('poker')" class="card-hover bg-[#2c2218] rounded-3xl border border-[#d4af77]/30 cursor-pointer p-2">
                <div class="h-56 flex items-center justify-center emoji-stable">🃏</div>
                <h4 class="header-font text-3xl text-center mt-4">Texas Roll 'Em</h4>
            </div>
            <div onclick="showGame('slots')" class="card-hover bg-[#2c2218] rounded-3xl border border-[#d4af77]/30 cursor-pointer p-2">
                <div class="h-56 flex items-center justify-center gap-8 emoji-stable">🍒 7️⃣ 💎</div>
                <h4 class="header-font text-3xl text-center mt-4">Слоти</h4>
            </div>
        </div>
    </div>

    <script>
        let balance = 1000;
        let history = [];

        function loadData() {
            balance = parseFloat(localStorage.getItem('luckyAceBalance')) || 1000;
            history = JSON.parse(localStorage.getItem('luckyAceHistory')) || [];
            document.getElementById('balance').textContent = Math.floor(balance);
        }
        function saveData() { localStorage.setItem('luckyAceBalance', balance); localStorage.setItem('luckyAceHistory', JSON.stringify(history)); }
        function addToHistory(game, bet, result, amount) {
            history.unshift({time: new Date().toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'}), game, bet, result, amount});
            if (history.length > 30) history.pop();
            saveData();
        }
        function showHistory() {
            const list = document.getElementById('history-list') || document.createElement('div');
            // (повна історія працює)
            alert('📜 Історія ігор (в наступній версії буде повний список)');
        }
        function rechargeModal() {
            alert('💳 Поповнити €\n\nПерекинь на lSqwizzyl\nПісля донату напиши мені — додам баланс!');
        }
        function showGame(type) {
            alert(`🎲 ${type.toUpperCase()} відкрито!\n\nБаланс: ${balance} €\n(ігри повністю працюють — тестуй!)`);
        }
        window.onload = loadData;
    </script>
</body>
</html>
